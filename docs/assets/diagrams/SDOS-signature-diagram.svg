<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#475569"/>
    </marker>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ==================== LAYER 1: SDOS ==================== -->
  <rect x="200" y="24" width="400" height="56" rx="8" fill="url(#hdr)"/>
  <text x="400" y="48" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="700" letter-spacing="1.5">SDOS</text>
  <text x="400" y="68" text-anchor="middle" fill="#94a3b8" font-size="10.5" letter-spacing="0.3">Security Decision Operating System</text>

  <!-- Connector: SDOS → SDOM -->
  <line x1="310" y1="80" x2="310" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Connector: SDOS → SDA -->
  <line x1="490" y1="80" x2="490" y2="268" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== LAYER 2: SDOM ==================== -->
  <rect x="120" y="110" width="380" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="310" y="134" text-anchor="middle" fill="#4c1d95" font-size="14" font-weight="700">SDOM</text>
  <text x="310" y="150" text-anchor="middle" fill="#6d28d9" font-size="10">Security Decision Operating Model</text>

  <!-- SDOM children -->
  <!-- AI Decision Governance -->
  <rect x="148" y="168" width="160" height="60" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="228" y="194" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">AI Decision</text>
  <text x="228" y="210" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">Governance</text>

  <!-- AIDA -->
  <rect x="336" y="168" width="140" height="60" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="406" y="190" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="700">AIDA</text>
  <text x="406" y="208" text-anchor="middle" fill="#6d28d9" font-size="9.5">AI Decision Authorization</text>

  <!-- ==================== LAYER 3: SDA ==================== -->
  <rect x="290" y="270" width="400" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.8"/>
  <text x="490" y="294" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="700">SDA</text>
  <text x="490" y="312" text-anchor="middle" fill="#475569" font-size="10">Security Decision Architecture</text>

  <!-- Connectors: SDA → Frameworks and Engines -->
  <line x1="400" y1="326" x2="400" y2="370" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="326" x2="580" y2="370" stroke="#475569" stroke-width="1.5"/>

  <!-- ==================== LAYER 4: FRAMEWORKS ==================== -->
  <rect x="270" y="370" width="260" height="46" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="398" text-anchor="middle" fill="#065f46" font-size="12" font-weight="700">Frameworks</text>

  <!-- Connector: Frameworks → children -->
  <line x1="340" y1="416" x2="340" y2="444" stroke="#059669" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="460" y1="416" x2="460" y2="444" stroke="#059669" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Guardian -->
  <rect x="270" y="446" width="140" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text x="340" y="464" text-anchor="middle" fill="#065f46" font-size="12" font-weight="600">Guardian</text>
  <text x="340" y="480" text-anchor="middle" fill="#047857" font-size="9">Risk Interpretation</text>

  <!-- SIRx -->
  <rect x="420" y="446" width="120" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text x="480" y="464" text-anchor="middle" fill="#065f46" font-size="12" font-weight="600">SIRx</text>
  <text x="480" y="480" text-anchor="middle" fill="#047857" font-size="9">Decision Discipline</text>

  <!-- ==================== LAYER 4: ENGINES ==================== -->
  <rect x="550" y="370" width="200" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="650" y="398" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="700">Engines</text>

  <!-- Connector: Engines → children -->
  <line x1="610" y1="416" x2="610" y2="444" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="700" y1="416" x2="700" y2="444" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- GIAP -->
  <rect x="555" y="446" width="110" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="610" y="464" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="600">GIAP</text>
  <text x="610" y="480" text-anchor="middle" fill="#1d4ed8" font-size="9">GRC Automation</text>

  <!-- TraceLock -->
  <rect x="675" y="446" width="110" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="730" y="464" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="600">TraceLock</text>
  <text x="730" y="480" text-anchor="middle" fill="#1d4ed8" font-size="9">RF Threat Detection</text>

  <!-- ==================== LAYER LABELS (left side) ==================== -->
  <text x="40" y="52" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="0.8">DOCTRINE</text>
  <text x="40" y="180" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="0.8">MODEL</text>
  <text x="40" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="0.8">ARCHITECTURE</text>
  <text x="40" y="460" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="0.8">OPERATIONS</text>

  <!-- Vertical guide line (left) -->
  <line x1="80" y1="30" x2="80" y2="490" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ==================== TAGLINE ==================== -->
  <text x="400" y="530" text-anchor="middle" fill="#334155" font-size="11" font-weight="600" font-style="italic">Security failures are decision failures. Architecture follows doctrine.</text>

  <!-- Attribution -->
  <text x="400" y="560" text-anchor="middle" fill="#94a3b8" font-size="8">© 2026 Pharns Génécé · portfolio.pharns.com</text>
</svg>
