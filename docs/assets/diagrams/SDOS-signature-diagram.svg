<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" role="img" aria-labelledby="title desc">
  <title id="title">SDOS signature diagram</title>
  <desc id="desc">A top-down hierarchy showing SDOS above SDOM, AI Decision Governance and AIDA within SDOM, SDA beneath the model, then Frameworks and Engines branching to Guardian, SIRx, GIAP, and TraceLock.</desc>
  <defs>
    <style>
      text { font-family: "Avenir Next", "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="960" height="760" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="480" y1="108" x2="480" y2="150" stroke="#334155" stroke-width="2"/>
    <line x1="480" y1="308" x2="480" y2="352" stroke="#334155" stroke-width="2"/>
    <line x1="480" y1="432" x2="480" y2="474" stroke="#334155" stroke-width="2"/>
    <line x1="480" y1="474" x2="290" y2="474" stroke="#94a3b8" stroke-width="1.6"/>
    <line x1="480" y1="474" x2="670" y2="474" stroke="#94a3b8" stroke-width="1.6"/>
    <line x1="290" y1="474" x2="290" y2="510" stroke="#94a3b8" stroke-width="1.6"/>
    <line x1="670" y1="474" x2="670" y2="510" stroke="#94a3b8" stroke-width="1.6"/>
    <line x1="290" y1="586" x2="290" y2="626" stroke="#94a3b8" stroke-width="1.4"/>
    <line x1="290" y1="586" x2="190" y2="586" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="290" y1="586" x2="390" y2="586" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="190" y1="586" x2="190" y2="626" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="390" y1="586" x2="390" y2="626" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="670" y1="586" x2="670" y2="626" stroke="#94a3b8" stroke-width="1.4"/>
    <line x1="670" y1="586" x2="570" y2="586" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="670" y1="586" x2="770" y2="586" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="570" y1="586" x2="570" y2="626" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="770" y1="586" x2="770" y2="626" stroke="#cbd5e1" stroke-width="1.4"/>
  </g>

  <g transform="translate(270 36)">
    <rect width="420" height="72" rx="18" fill="#0f172a"/>
    <text x="210" y="32" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" letter-spacing="2.8">SDOS</text>
    <text x="210" y="54" text-anchor="middle" fill="#cbd5e1" font-size="14">Security Decision Operating System</text>
  </g>

  <g transform="translate(180 150)">
    <rect width="600" height="158" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="300" y="34" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700" letter-spacing="1.4">SDOM</text>
    <text x="300" y="58" text-anchor="middle" fill="#475569" font-size="14">Security Decision Operating Model</text>

    <rect x="48" y="84" width="228" height="52" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="162" y="116" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="600">AI Decision Governance</text>

    <rect x="324" y="84" width="228" height="52" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="438" y="109" text-anchor="middle" fill="#1e293b" font-size="17" font-weight="700">AIDA</text>
    <text x="438" y="127" text-anchor="middle" fill="#475569" font-size="13">AI Decision Authorization</text>
  </g>

  <g transform="translate(240 352)">
    <rect width="480" height="80" rx="20" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.8"/>
    <text x="240" y="35" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700" letter-spacing="1.4">SDA</text>
    <text x="240" y="58" text-anchor="middle" fill="#475569" font-size="14">Security Decision Architecture</text>
  </g>

  <g transform="translate(150 510)">
    <rect width="280" height="76" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="1.8"/>
    <text x="140" y="35" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Frameworks</text>
    <text x="140" y="56" text-anchor="middle" fill="#64748b" font-size="13">Decision structure and interpretation</text>
  </g>

  <g transform="translate(530 510)">
    <rect width="280" height="76" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="1.8"/>
    <text x="140" y="35" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Engines</text>
    <text x="140" y="56" text-anchor="middle" fill="#64748b" font-size="13">Operational systems and execution</text>
  </g>

  <g transform="translate(120 626)">
    <rect width="140" height="56" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="70" y="34" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="600">Guardian</text>
  </g>

  <g transform="translate(320 626)">
    <rect width="140" height="56" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="70" y="34" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="600">SIRx</text>
  </g>

  <g transform="translate(500 626)">
    <rect width="140" height="56" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="70" y="34" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="600">GIAP</text>
  </g>

  <g transform="translate(700 626)">
    <rect width="140" height="56" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="70" y="34" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="600">TraceLock</text>
  </g>

  <text x="480" y="724" text-anchor="middle" fill="#334155" font-size="16" font-weight="600">Security begins with disciplined decisions, not tools.</text>
</svg>
