<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-feedback" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="960" height="56" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="40" width="960" height="16" fill="url(#headerGrad)"/>
  <text x="480" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="600" letter-spacing="0.5">Security Decision Architecture (SDA)</text>

  <!-- SDOM label above -->
  <rect x="320" y="68" width="320" height="28" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="480" y="87" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="600">SDOM — Decision Framework &amp; Governance Logic</text>

  <!-- Pipeline stages - 5 blocks -->

  <!-- Stage 1: Telemetry -->
  <rect x="60" y="120" width="160" height="100" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="140" y="148" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700">Telemetry Sources</text>
  <line x1="80" y1="158" x2="200" y2="158" stroke="#a7f3d0" stroke-width="1"/>
  <text x="140" y="176" text-anchor="middle" fill="#047857" font-size="10.5">RF / Wireless</text>
  <text x="140" y="192" text-anchor="middle" fill="#047857" font-size="10.5">Network / Host</text>
  <text x="140" y="208" text-anchor="middle" fill="#047857" font-size="10.5">Cloud / Endpoint</text>

  <!-- Stage 2: Detection -->
  <rect x="250" y="120" width="160" height="100" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="148" text-anchor="middle" fill="#1e3a5f" font-size="13" font-weight="700">Detection &amp;</text>
  <text x="330" y="163" text-anchor="middle" fill="#1e3a5f" font-size="13" font-weight="700">Correlation</text>
  <line x1="270" y1="170" x2="390" y2="170" stroke="#bfdbfe" stroke-width="1"/>
  <text x="330" y="188" text-anchor="middle" fill="#1d4ed8" font-size="10.5">Rule Authoring</text>
  <text x="330" y="204" text-anchor="middle" fill="#1d4ed8" font-size="10.5">Signal Correlation</text>

  <!-- Stage 3: Automation -->
  <rect x="440" y="120" width="160" height="100" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="520" y="148" text-anchor="middle" fill="#713f12" font-size="13" font-weight="700">Automation &amp;</text>
  <text x="520" y="163" text-anchor="middle" fill="#713f12" font-size="13" font-weight="700">AI Workflows</text>
  <line x1="460" y1="170" x2="580" y2="170" stroke="#fef08a" stroke-width="1"/>
  <text x="520" y="188" text-anchor="middle" fill="#a16207" font-size="10.5">Orchestration</text>
  <text x="520" y="204" text-anchor="middle" fill="#a16207" font-size="10.5">Enrichment / Routing</text>

  <!-- Stage 4: Governance -->
  <rect x="630" y="120" width="160" height="100" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="710" y="148" text-anchor="middle" fill="#831843" font-size="13" font-weight="700">Governance &amp;</text>
  <text x="710" y="163" text-anchor="middle" fill="#831843" font-size="13" font-weight="700">Risk Processing</text>
  <line x1="650" y1="170" x2="770" y2="170" stroke="#fbcfe8" stroke-width="1"/>
  <text x="710" y="188" text-anchor="middle" fill="#be185d" font-size="10.5">Control Mapping</text>
  <text x="710" y="204" text-anchor="middle" fill="#be185d" font-size="10.5">Evidence Pipelines</text>

  <!-- Stage 5: Decisions -->
  <rect x="820" y="120" width="110" height="100" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="875" y="153" text-anchor="middle" fill="#4c1d95" font-size="13" font-weight="700">Security</text>
  <text x="875" y="168" text-anchor="middle" fill="#4c1d95" font-size="13" font-weight="700">Decisions</text>
  <line x1="835" y1="176" x2="915" y2="176" stroke="#ddd6fe" stroke-width="1"/>
  <text x="875" y="194" text-anchor="middle" fill="#6d28d9" font-size="10.5">Prioritization</text>
  <text x="875" y="210" text-anchor="middle" fill="#6d28d9" font-size="10.5">Action / Accept</text>

  <!-- Pipeline arrows -->
  <line x1="220" y1="170" x2="248" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="170" x2="438" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="170" x2="628" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="790" y1="170" x2="818" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Portfolio System Mapping (below pipeline) -->

  <!-- TraceLock -->
  <rect x="75" y="260" width="130" height="36" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="283" text-anchor="middle" fill="#065f46" font-size="11" font-weight="600">TraceLock</text>
  <line x1="140" y1="260" x2="140" y2="220" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Detection Engineering -->
  <rect x="265" y="260" width="130" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="330" y="283" text-anchor="middle" fill="#1e3a5f" font-size="11" font-weight="600">Detection Eng.</text>
  <line x1="330" y1="260" x2="330" y2="220" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- AgenticOS -->
  <rect x="455" y="260" width="130" height="36" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="520" y="283" text-anchor="middle" fill="#713f12" font-size="11" font-weight="600">AgenticOS</text>
  <line x1="520" y1="260" x2="520" y2="220" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- GIAP -->
  <rect x="645" y="260" width="130" height="36" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="710" y="283" text-anchor="middle" fill="#831843" font-size="11" font-weight="600">GIAP</text>
  <line x1="710" y1="260" x2="710" y2="220" stroke="#db2777" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Architecture Decisions -->
  <rect x="825" y="260" width="110" height="36" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="880" y="278" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="600">Arch Decisions</text>
  <text x="880" y="291" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="600">/ SDOM</text>
  <line x1="875" y1="260" x2="875" y2="220" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Portfolio mapping label -->
  <text x="480" y="330" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Portfolio artifact mapping — dashed lines connect systems to their architecture layer</text>

  <!-- Feedback loop -->
  <rect x="60" y="360" width="870" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Feedback label -->
  <text x="480" y="385" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">Governance Feedback Loop</text>

  <!-- Feedback sub-items -->
  <rect x="100" y="400" width="200" height="36" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="200" y="423" text-anchor="middle" fill="#5b21b6" font-size="10.5">Detection Tuning</text>

  <rect x="380" y="400" width="200" height="36" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="480" y="423" text-anchor="middle" fill="#5b21b6" font-size="10.5">Automation Policy Updates</text>

  <rect x="660" y="400" width="200" height="36" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="760" y="423" text-anchor="middle" fill="#5b21b6" font-size="10.5">Governance Refinement</text>

  <!-- Feedback arrows from Decisions down to loop -->
  <path d="M875,220 L875,240 Q875,250 885,250 L920,250 Q940,250 940,270 L940,390 Q940,405 925,405 L865,405" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-feedback)"/>

  <!-- Loop arrows back up to stages -->
  <path d="M100,400 L100,380 Q100,355 115,355 L140,355 Q155,355 155,340 L155,296" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-feedback)"/>
  <path d="M380,400 L380,380 Q380,355 395,355 L520,355 Q535,355 535,340 L535,296" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-feedback)"/>
  <path d="M660,400 L660,380 Q660,355 675,355 L710,355 Q725,355 725,340 L725,296" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-feedback)"/>

  <!-- Bottom annotation -->
  <text x="480" y="480" text-anchor="middle" fill="#334155" font-size="11" font-weight="600">SDA is the technical implementation layer beneath SDOM</text>
  <text x="480" y="498" text-anchor="middle" fill="#64748b" font-size="10">Telemetry → Detection → Automation → Governance → Decisions</text>

  <!-- Legend -->
  <rect x="60" y="525" width="840" height="75" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="548" fill="#334155" font-size="10" font-weight="600">LEGEND</text>
  <line x1="80" y1="560" x2="120" y2="560" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="130" y="564" fill="#475569" font-size="10">Pipeline flow</text>
  <line x1="260" y1="560" x2="300" y2="560" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-feedback)"/>
  <text x="310" y="564" fill="#475569" font-size="10">Feedback loop</text>
  <line x1="450" y1="560" x2="490" y2="560" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="500" y="564" fill="#475569" font-size="10">Portfolio system mapping</text>
  <rect x="80" y="575" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="102" y="586" fill="#475569" font-size="10">Decision layer / SDOM</text>
  <rect x="260" y="575" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <rect x="280" y="575" width="14" height="14" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="300" y="575" width="14" height="14" rx="3" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <rect x="320" y="575" width="14" height="14" rx="3" fill="#fdf2f8" stroke="#db2777" stroke-width="1.5"/>
  <text x="342" y="586" fill="#475569" font-size="10">Pipeline stages (Telemetry → Detection → Automation → Governance)</text>

  <!-- Attribution -->
  <text x="880" y="610" text-anchor="end" fill="#94a3b8" font-size="8">© 2026 Pharns Génécé · portfolio.pharns.com</text>
</svg>
